name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  content-checks:
    name: Content checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required governance files
        shell: bash
        run: |
          set -euo pipefail
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CODE_OF_CONDUCT.md
          test -f CHANGELOG.md
          test -f .github/PULL_REQUEST_TEMPLATE.md
          test -f .github/ISSUE_TEMPLATE/bug_report.md
          test -f .github/ISSUE_TEMPLATE/feature_request.md
          test -f .github/ISSUE_TEMPLATE/config.yml

      - name: Check for placeholder values
        shell: bash
        run: |
          set -euo pipefail
          placeholder_pattern='OWNER''/REPO|TO''DO|T''BD'
          if grep -RInE "$placeholder_pattern" .github README.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md CHANGELOG.md; then
            echo "Found placeholder content"
            exit 1
          fi

      - name: Validate package.json
        shell: bash
        run: |
          set -euo pipefail
          node -e "const pkg=require('./package.json'); if(!pkg.name||!pkg.version) { console.error('package.json missing name or version'); process.exit(1); } console.log('package.json valid: ' + pkg.name + '@' + pkg.version);"

  powershell-smoke:
    name: PowerShell smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path scripts -Filter *.ps1 | ForEach-Object {
            $null = $tokens = $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors.Count -gt 0) {
              $errors += $parseErrors | ForEach-Object { "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run memory smoke flow
        shell: pwsh
        run: |
          $projectRoot = Join-Path $env:RUNNER_TEMP "memory-smoke-project"
          if (Test-Path $projectRoot) {
            Remove-Item -LiteralPath $projectRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $projectRoot | Out-Null
          .\scripts\install-superpowers-memory.ps1 -ProjectRoot $projectRoot
          .\scripts\validate-superpowers-memory.ps1 -ProjectRoot $projectRoot
          .\scripts\search-superpowers-memory.ps1 -ProjectRoot $projectRoot -Type decisions -Query "template" -Summary
          .\scripts\suggest-superpowers-memory-updates.ps1 -ProjectRoot $projectRoot -ChangedPaths "scripts/validate-superpowers-memory.ps1" -Signals "validation"
          .\scripts\run-superpowers-memory-closeout.ps1 -ProjectRoot $projectRoot -ChangedPaths "scripts/validate-superpowers-memory.ps1" -Signals "validation" -RunValidator

  shell-smoke:
    name: Shell smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse shell scripts
        shell: bash
        run: |
          set -euo pipefail
          for file in scripts/*.sh; do
            bash -n "$file"
          done

      - name: Run memory smoke flow
        shell: bash
        run: |
          set -euo pipefail
          project_root="$RUNNER_TEMP/memory-smoke-project"
          rm -rf "$project_root"
          mkdir -p "$project_root"
          sh "./scripts/install-superpowers-memory.sh" --project-root "$project_root"
          sh "./scripts/validate-superpowers-memory.sh" --project-root "$project_root"
          sh "./scripts/search-superpowers-memory.sh" --project-root "$project_root" --type decisions --query template --summary --recent-first
          sh "./scripts/suggest-superpowers-memory-updates.sh" --project-root "$project_root" --changed-paths "scripts/validate-superpowers-memory.ps1" --signals "validation"
          sh "./scripts/run-superpowers-memory-closeout.sh" --project-root "$project_root" --changed-paths "scripts/validate-superpowers-memory.ps1" --signals "validation" --run-validator

      - name: Validate npm package
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run 2>&1 | head -20
          echo "npm pack dry-run succeeded"

  publish:
    name: Publish to Nexus
    needs: [content-checks, powershell-smoke, shell-smoke]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://nexus.your-company.com/repository/npm-hosted/'

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NEXUS_NPM_TOKEN }}
